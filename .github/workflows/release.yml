name: Release

# Release automation for the npm package, in two stages:
#
#   1. release-please watches main. Conventional-commit history is accumulated
#      into a "release PR" that bumps the version + CHANGELOG. Nothing publishes
#      while that PR sits open. Merging it is the human gate: release-please then
#      tags the commit and cuts a GitHub release, setting release_created=true.
#
#   2. Only on that release commit, the publish job re-runs the full CI gate and
#      publishes to npm with provenance.
#
# Security posture:
#   - Default-deny permissions at the top; each job is granted only what it needs.
#   - No long-lived npm secret: the publish job authenticates via OIDC trusted
#     publishing (a trusted publisher registered on npmjs.com for this repo +
#     workflow). npm exchanges the Actions OIDC token for a short-lived
#     credential at publish time -- nothing to leak, and it satisfies
#     require-2FA-on-publish. Runs only on a release commit or manual dispatch,
#     never on PRs (a fork PR can't assume this repo's OIDC subject anyway).
#   - Provenance (--provenance + id-token: write) signs the published tarball so
#     consumers can verify it was built from this repo at this commit.
#   - pnpm install --frozen-lockfile installs exactly the lockfile; the registry
#     rejects re-publishing an existing version, so a re-run can't clobber a release.

on:
  push:
    branches: [main]
  # Manual re-publish of an already-cut tag (e.g. when the automatic
  # publish job failed after release-please created the release). Publishes
  # the given existing tag to npm; the registry rejects clobbering an
  # already-published version, so this is safe to retry.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)publish to npm, e.g. v0.1.0"
        required: true
        type: string

# Default-deny; jobs opt into the minimum they need.
permissions: {}

# Serialize releases and never cancel a publish mid-flight — interrupting the
# publish could leave a half-uploaded release. Runs queue instead.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release tag + GitHub release
      pull-requests: write # open/update the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the OIDC token npm uses to attest provenance
    environment: npm-publish # optional manual-approval / secret-scoping gate
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name || inputs.tag }}

      # Install the pnpm version pinned by package.json's "packageManager" field.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      # Re-run the full gate on the exact commit being published. CI already
      # ran it, but re-running here means the bytes we publish are the bytes we
      # verified — no trust gap between the gate and the upload.
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm test
      - run: pnpm run verify:pack

      # Publish via OIDC trusted publishing -- no long-lived npm secret. With a
      # trusted publisher registered on npmjs.com for this repo + workflow
      # (release.yml, environment npm-publish) and `id-token: write` above, npm
      # exchanges the Actions OIDC token for a short-lived, 2FA-satisfying
      # publish credential. Trusted publishing needs npm >= 11.5.1; Node 22
      # bundles npm 10.x, so upgrade the CLI first. We publish with the npm CLI
      # (first-class trusted-publishing support); pnpm drives install/build/test.
      #   --provenance:    signed build-provenance attestation.
      #   --access public: a scoped @nexus-xyz/ package is private by default.
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public
